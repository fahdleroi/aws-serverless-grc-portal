<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRC & Security Control Center</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f172a; --bg-panel: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --accent-blue: #3b82f6; --accent-red: #ef4444; --accent-yellow: #f59e0b; --accent-green: #10b981; --border-color: #334155; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background-color: var(--bg-panel); border-right: 1px solid var(--border-color); padding: 20px 0; display: flex; flex-direction: column; }
        .logo-area { padding: 0 20px 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-size: 1.2rem; font-weight: bold; color: var(--accent-blue); }
        .nav-item { padding: 12px 20px; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 12px; transition: 0.2s; cursor: pointer; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { background-color: #0f172a; color: var(--text-main); border-left-color: var(--accent-blue); }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem; font-weight: 600; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background-color: var(--bg-panel); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .stat-info h3 { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 5px; font-weight: 500;}
        .stat-info p { font-size: 1.8rem; font-weight: bold; }
        .stat-icon { font-size: 2rem; opacity: 0.8; }
        .action-panel { background-color: var(--bg-panel); padding: 25px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 30px; }
        .action-panel h2 { font-size: 1.2rem; margin-bottom: 15px; color: var(--text-main); }
        .input-group { display: flex; gap: 15px; }
        input[type="text"] { flex: 1; padding: 12px 15px; background-color: var(--bg-dark); border: 1px solid var(--border-color); color: white; border-radius: 6px; font-size: 0.95rem; }
        input[type="text"]:focus { outline: none; border-color: var(--accent-blue); }
        button { padding: 12px 25px; background-color: var(--accent-blue); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        button:hover { background-color: #2563eb; }
        .task-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
        .task-item { background-color: var(--bg-panel); padding: 16px 20px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .task-content { display: flex; align-items: center; gap: 15px; flex: 1; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-pentest { background-color: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-audit { background-color: rgba(245, 158, 11, 0.2); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-pra { background-color: rgba(59, 130, 246, 0.2); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.3); }
        .badge-grc { background-color: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-default { background-color: rgba(148, 163, 184, 0.2); color: #cbd5e1; border: 1px solid rgba(148, 163, 184, 0.3); }
        .task-title { font-size: 0.95rem; font-weight: 500; }
        .task-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 15px; }
        
        /* Styles pour les nouveaux boutons */
        .btn-action { padding: 6px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.8rem; color: white; display: flex; align-items: center; gap: 5px; }
        .btn-update { background-color: var(--accent-green); }
        .btn-update:hover { background-color: #059669; }
        .btn-delete { background-color: var(--accent-red); }
        .btn-delete:hover { background-color: #dc2626; }
        .task-completed .task-title { text-decoration: line-through; color: var(--text-muted); }
        .task-completed .btn-update { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area"><i class="fa-solid fa-shield-halved"></i> GRC Portal</div>
        <div class="nav-item active" onclick="setFilter('all', this)"><i class="fa-solid fa-chart-line"></i> Plan d'action Global</div>
        <div class="nav-item" onclick="setFilter('pentest', this)"><i class="fa-solid fa-bug"></i> Campagnes Pentest</div>
        <div class="nav-item" onclick="setFilter('audit', this)"><i class="fa-solid fa-file-contract"></i> Audits de Config</div>
        <div class="nav-item" onclick="setFilter('pra', this)"><i class="fa-solid fa-server"></i> Suivi PRA / PCA</div>
        <div class="nav-item" style="margin-top: auto;"><i class="fa-solid fa-gear"></i> Paramètres AWS</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 id="pageTitle">Tableau de bord de Remédiation</h1>
            <div style="color: var(--text-muted); font-size: 0.9rem;"><i class="fa-solid fa-circle-user"></i> Connecté en tant qu'Ingénieur SI</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-info"><h3>Score de Conformité</h3><p style="color: var(--accent-green);">84%</p></div><i class="fa-solid fa-check-double stat-icon" style="color: var(--accent-green);"></i></div>
            <div class="stat-card"><div class="stat-info"><h3>Vulnérabilités Ouvertes</h3><p style="color: var(--accent-red);">12</p></div><i class="fa-solid fa-triangle-exclamation stat-icon" style="color: var(--accent-red);"></i></div>
            <div class="stat-card"><div class="stat-info"><h3>Tâches (Vue actuelle)</h3><p id="taskCount" style="color: var(--accent-blue);">0</p></div><i class="fa-solid fa-list-check stat-icon" style="color: var(--accent-blue);"></i></div>
        </div>

        <div class="action-panel">
            <h2><i class="fa-solid fa-bolt" style="color: var(--accent-yellow);"></i> Nouvelle action corrective</h2>
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Tapez votre tâche (les mots pentest, audit ou PRA seront détectés automatiquement)...">
                <button onclick="addTask()"><i class="fa-solid fa-cloud-arrow-up"></i> Déployer</button>
            </div>
        </div>

        <ul class="task-list" id="taskList"></ul>
    </div>

    <script>
        const API_URL = 'https://olf5msvu56.execute-api.eu-west-3.amazonaws.com/PROD/todos';
        let allTasks = [];
        let currentFilter = 'all';

        // L'algorithme de détection intelligent
        function getTaskStyles(title) {
            const lowerTitle = title.toLowerCase();
            let badgeClass = 'badge-default';
            let badgeText = 'GÉNÉRAL';

            if (lowerTitle.includes('pentest')) { badgeClass = 'badge-pentest'; badgeText = 'PENTEST'; }
            else if (lowerTitle.includes('audit')) { badgeClass = 'badge-audit'; badgeText = 'AUDIT'; }
            else if (lowerTitle.includes('pra') || lowerTitle.includes('pca')) { badgeClass = 'badge-pra'; badgeText = 'PRA'; }
            else if (lowerTitle.includes('grc')) { badgeClass = 'badge-grc'; badgeText = 'GRC'; }

            // Enlève les crochets du titre visuel s'il y en a pour faire propre
            const cleanTitle = title.replace(/^\[.*?\]\s*/, '');

            return { text: badgeText, cleanTitle: cleanTitle, class: badgeClass };
        }

        async function fetchTasks() {
            try {
                const response = await fetch(API_URL);
                allTasks = await response.json();
                renderTasks();
            } catch (error) { console.error("Erreur Fetch", error); }
        }

        function setFilter(filterType, element) {
            currentFilter = filterType;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            const titles = {'all':'Tableau de bord Global','pentest':'Suivi des Campagnes Pentest','audit':'Audits de Configuration Cloud','pra':'Continuité d\'Activité (PRA/PCA)'};
            document.getElementById('pageTitle').innerText = titles[filterType];
            
            const newScore = Math.floor(Math.random() * (98 - 65 + 1)) + 65;
            const newVulns = Math.floor(Math.random() * 25);
            const scoreElement = document.querySelector('.stat-card:nth-child(1) p');
            const vulnElement = document.querySelector('.stat-card:nth-child(2) p');
            scoreElement.innerText = newScore + '%';
            vulnElement.innerText = newVulns;
            scoreElement.style.color = newScore >= 80 ? 'var(--accent-green)' : (newScore >= 70 ? 'var(--accent-yellow)' : 'var(--accent-red)');
            document.querySelector('.stat-card:nth-child(1) .stat-icon').style.color = scoreElement.style.color;
            
            renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            let tasksToShow = allTasks;
            
            // Le filtre intelligent
            if (currentFilter !== 'all') {
                tasksToShow = allTasks.filter(task => {
                    const t = task.title.toLowerCase();
                    if (currentFilter === 'pentest') return t.includes('pentest');
                    if (currentFilter === 'audit') return t.includes('audit');
                    if (currentFilter === 'pra') return t.includes('pra') || t.includes('pca');
                    return false;
                });
            }
            document.getElementById('taskCount').innerText = tasksToShow.length;

            tasksToShow.forEach(task => {
                const style = getTaskStyles(task.title);
                const li = document.createElement('li');
                li.className = `task-item ${task.isCompleted ? 'task-completed' : ''}`;
                li.innerHTML = `
                    <div class="task-content">
                        <span class="badge ${style.class}">${style.text}</span>
                        <span class="task-title">${style.cleanTitle}</span>
                    </div>
                    <div class="task-meta">
                        <span><i class="fa-regular fa-calendar"></i> ${new Date(task.createdAt).toLocaleDateString('fr-FR')}</span>
                        <button class="btn-action btn-update" onclick="updateTask('${task.todoId}')"><i class="fa-solid fa-check"></i></button>
                        <button class="btn-action btn-delete" onclick="deleteTask('${task.todoId}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        async function addTask() {
            const title = document.getElementById('taskInput').value;
            if (!title) return;
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ title: title }), headers: { 'Content-Type': 'application/json' } });
            document.getElementById('taskInput').value = '';
            fetchTasks();
        }

        async function updateTask(id) {
            await fetch(`${API_URL}/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' } });
            fetchTasks();
        }

        async function deleteTask(id) {
            if(confirm("Supprimer cette tâche définitivement ?")) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE', headers: { 'Content-Type': 'application/json' } });
                fetchTasks();
            }
        }

        fetchTasks();
    </script>
</body>
</html>
